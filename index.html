<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course 3 Mod 8 Lab</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Single Page Application - Wordly</h1>
    </header>
    <main>
        <form id="search-form">
            <label for="search-input">Enter a word:</label>
            <input type="text" name="search" id="search-input"
                placeholder="Search for a word" required>
            <button type="submit" id="search-button">Search</button>
        </form>
        <section id="search-results" aria-live="polite">
            <h2>Results</h2>
            <h3 id="word-result"></h3>
            <p id="definition-result"></p>
            <audio id="word-audio" aria-label="word audio" controls>
                Your browser does not support the audio element.
            </audio>
        </section>
    </main>
    <script src="index.js"></script>
</body>

</html>
